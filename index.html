<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fujairah International Airport - Virtual Tour Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ===== STYLE (UPDATED UI) ===== -->
  <style>
  body {
    margin: 0;
    font-family: 'Poppins', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a1a2f, #1e3c72);
  }

  /* LOGIN OVERLAY */
  .login-overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url('img/airport.jpg') no-repeat center/cover;
    z-index: 9999;
  }

  /* LOGIN BOX */
  .login-card {
    backdrop-filter: blur(15px);
    background: rgba(0, 0, 0, 0.6);
    padding: 40px;
    border-radius: 20px;
    width: 340px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  .login-header h1 {
    margin-bottom: 5px;
    font-size: 20px;
  }

  .login-header p {
    color: #ccc;
    font-size: 13px;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
  }

  .login-btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #4facfe, #00f2fe);
    color: white;
    cursor: pointer;
    transition: 0.3s;
  }

  .login-btn:hover {
    transform: scale(1.05);
  }

  .login-demo-box {
    margin-top: 15px;
    font-size: 12px;
    color: #aaa;
  }

  .login-error {
    color: red;
    font-size: 12px;
  }
  </style>

  <!-- ORIGINAL FILES -->
  <link rel="stylesheet" href="vendor/reset.min.css">
  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- LOGIN -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <div class="login-header">
      <h1>Fujairah International Airport</h1>
      <p>Smart Virtual Tour Access</p>
    </div>

    <select id="roleSelect">
      <option value="passenger">Passenger</option>
      <option value="admin">Admin</option>
    </select>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button class="login-btn" onclick="login()">Login</button>

    <p id="loginError" class="login-error"></p>

    <div class="login-demo-box">
      Passenger: passenger / passenger123 <br>
      Admin: admin / admin123
    </div>
  </div>
</div>

<!-- HEADER -->
<div id="headerBar">
  <span>Virtual Tour</span>
  <button onclick="logout()">Logout</button>
</div>

<!-- PANO -->
<div id="pano"></div>

<!-- LIBRARIES -->
<script src="vendor/marzipano.js"></script>
<script src="data.js"></script>
<script src="index.js"></script>

<!-- SIMPLE LOGIN SCRIPT -->
<script>
function login() {
  document.getElementById("loginOverlay").style.display = "none";
}

function logout() {
  document.getElementById("loginOverlay").style.display = "flex";
}
</script>

</body>
</html>
