<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fujairah Airport</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('img/airport.jpg') no-repeat center/cover;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Login Box */
.login-container {
  backdrop-filter: blur(15px);
  background: rgba(0, 0, 0, 0.55);
  padding: 40px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

h1 {
  font-size: 20px;
  margin-bottom: 5px;
}

p {
  color: #ccc;
  font-size: 13px;
}

select, input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg, #4facfe, #00f2fe);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.demo {
  margin-top: 15px;
  font-size: 12px;
  color: #aaa;
}
</style>

</head>
<body>

<div class="login-container">
  <h1>Fujairah International Airport</h1>
  <p>Smart Virtual Tour Access</p>

  <select>
    <option>Passenger</option>
    <option>Admin</option>
  </select>

  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="demo">
    Passenger: passenger / passenger123 <br>
    Admin: admin / admin123
  </div>
</div>

<script>
function login() {
  alert("Login successful (Demo)");
}
</script>

</body>
</html>
