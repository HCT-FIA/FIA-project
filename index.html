<!DOCTYPE html>
<html>
<head>
  <title>Fujairah International Airport - Virtual Tour Demo</title>
  <meta charset="utf-8">
  <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="vendor/reset.min.css">
  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="multiple-scenes view-control-buttons">

  <!-- LOGIN SCREEN -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <div class="login-header">
        <h1>Fujairah International Airport</h1>
        <p>Smart Virtual Tour Access</p>
      </div>

      <div class="login-role-box">
        <select id="roleSelect">
          <option value="passenger">Passenger</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">

      <button id="loginBtn">Login</button>
    </div>
  </div>

  <!-- HEADER -->
  <div id="headerBar">
    <div class="logo-section">
      <span class="logo-text">Virtual Tour</span>
    </div>

    <div class="header-actions">
      <button id="ptzCameraBtn">📹 PTZ Camera</button>

      <!-- 🔥 NEW CAMERA BUTTON -->
      <button onclick="openCamera()">📷 Camera</button>

      <button id="logoutBtn">Logout</button>
    </div>
  </div>

  <!-- PANO -->
  <div id="pano"></div>

  <!-- CAMERA BOX -->
  <div id="cameraBox" style="display:none; position:fixed; bottom:20px; right:20px; width:320px; background:#000; padding:10px; border-radius:12px; z-index:9999;">
    <video id="camera" autoplay playsinline style="width:100%; border-radius:10px;"></video>
  </div>

  <!-- LIBRARIES -->
  <script src="vendor/marzipano.js"></script>
  <script src="data.js"></script>

  <!-- TensorFlow -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <script src="index.js"></script>

  <!-- 🔥 CAMERA SCRIPT -->
  <script>
    let stream = null;

    function openCamera() {
      const video = document.getElementById("camera");
      const box = document.getElementById("cameraBox");

      if (!stream) {
        navigator.mediaDevices.getUserMedia({ video: true })
          .then(s => {
            stream = s;
            video.srcObject = stream;
            box.style.display = "block";
          })
          .catch(() => alert("Camera not working"));
      } else {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
        box.style.display = "none";
      }
    }
  </script>

</body>
</html>
