<!DOCTYPE html>
<html>
<head>
  <title>Fujairah International Airport - Virtual Tour Demo</title>
  <meta charset="utf-8">
  <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
  <style>@-ms-viewport { width: device-width; }</style>

  <link rel="stylesheet" href="vendor/reset.min.css">
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="multiple-scenes view-control-buttons">

  <!-- LOGIN SCREEN -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <div class="login-header">
        <h1>Fujairah International Airport</h1>
        <p>Smart Virtual Tour Access</p>
      </div>

      <div class="login-role-box">
        <label for="roleSelect">Select Role</label>
        <select id="roleSelect">
          <option value="passenger">Passenger</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <div class="login-input-box">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username">
      </div>

      <div class="login-input-box">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password">
      </div>

      <button id="loginBtn" class="login-btn" type="button">Login</button>

      <p id="loginError" class="login-error"></p>

      <div class="login-demo-box">
        <p><strong>Demo Accounts:</strong></p>
        <p>Passenger: <span>passenger</span> / <span>passenger123</span></p>
        <p>Admin: <span>admin</span> / <span>admin123</span></p>
      </div>
    </div>
  </div>

  <!-- Header -->
  <div id="headerBar">
    <div class="logo-section">
      <img src="https://www.fujairah-airport.ae/images/logo.png" alt="FIA Logo" class="fia-logo">
      <span class="logo-text">Virtual Tour</span>
    </div>

    <div class="header-tagline">Your Gateway to the World</div>

    <div class="header-actions">
      <button id="ptzCameraBtn" type="button">📹 PTZ Camera</button>

      <!-- ✅ NEW CAMERA BUTTON -->
      <button id="openCameraBtn" type="button">📷 Camera</button>

      <button id="logoutBtn" type="button" class="logout-btn">Logout</button>
    </div>
  </div>

  <!-- PANO -->
  <div id="pano"></div>

  <!-- SCENE LIST -->
  <div id="sceneList">
    <ul class="scenes">
      <a href="#" class="scene" data-id="0-entrance"><li>Entrance</li></a>
      <a href="#" class="scene" data-id="1-lobby"><li>Lobby</li></a>
    </ul>
  </div>

  <!-- CAMERA BOX -->
  <div id="cameraBox">
    <video id="camera" autoplay playsinline></video>
  </div>

  <!-- LIBRARIES -->
  <script src="vendor/marzipano.js"></script>
  <script src="data.js"></script>

  <!-- TensorFlow -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <script src="index.js"></script>

</body>
</html>
