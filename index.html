<!DOCTYPE html>
<html>
<head>
  <title>Fujairah International Airport - Virtual Tour Demo</title>
  <meta charset="utf-8">
  <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
  <style>@-ms-viewport { width: device-width; }</style>

  <!-- FIXED -->
  <link rel="stylesheet" href="vendor/reset.min.css">
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div id="headerBar">
  <button id="ptzCameraBtn">📹 PTZ Camera</button>
</div>

<!-- PTZ PANEL -->
<div id="ptzCameraPanel">

  <!-- LIVE CAMERA -->
  <div class="live-camera-card">
    <h3>Real-Time Camera Feed</h3>

    <button id="liveCamToggleBtn">📷 Turn On Camera</button>

    <video id="liveCamVideo" autoplay muted playsinline style="width:100%; display:none;"></video>

    <button id="liveCamAnalyzeBtn" disabled>🔍 Analyze Scene</button>

    <p id="liveCamScene">-</p>
    <p id="liveCamCrowd">-</p>
    <p id="liveCamSecurity">-</p>
    <p id="liveCamObjects">-</p>
    <p id="liveCamRecommendation">Turn on camera first</p>

  </div>

</div>

<!-- SCENES -->
<a href="javascript:void(0)">Scene 1</a>
<a href="javascript:void(0)">Scene 2</a>

<!-- LIBRARIES -->
<script src="vendor/marzipano.js"></script>
<script src="index.js"></script>

<!-- CAMERA SCRIPT -->
<script>
let video = document.getElementById("liveCamVideo");
let btn = document.getElementById("liveCamToggleBtn");
let analyze = document.getElementById("liveCamAnalyzeBtn");

let stream = null;
let isOn = false;

btn.onclick = async function() {
  if (!isOn) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      video.style.display = "block";
      btn.innerText = "🚫 Turn Off Camera";
      analyze.disabled = false;
      isOn = true;
    } catch (e) {
      alert("Camera not working: " + e.message);
    }
  } else {
    stream.getTracks().forEach(t => t.stop());
    video.style.display = "none";
    btn.innerText = "📷 Turn On Camera";
    analyze.disabled = true;
    isOn = false;
  }
};
</script>

</body>
</html>
